<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Review — x-onset</title>
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/navbar.css">
</head>
<body>

  <div id="toolbar">
    <button id="btn-library" onclick="window.location.href='/'">&#8592; Library</button>
    <button id="btn-play">Play</button>
    <span id="time-display">0:00 / 0:00</span>
    <div id="beat-flash" title="Beat indicator"></div>
    <button id="btn-prev">&#9664; Prev</button>
    <button id="btn-next">Next &#9654;</button>
    <button id="btn-clear">Clear Focus</button>
    <span id="focus-label"></span>
    <span id="selected-count"></span>
    <span class="toolbar-sep"></span>
    <button id="btn-zoom-out" title="Zoom out (Ctrl+-)">&#8722;</button>
    <span id="zoom-level">100%</span>
    <button id="btn-zoom-in" title="Zoom in (Ctrl++)">+</button>
    <button id="btn-phonemes" onclick="window.location.href='/phonemes-view'" disabled title="No phoneme data — re-analyze with Phonemes enabled">Phonemes</button>
    <button id="btn-sweep" onclick="window.location.href='/sweep-view'" title="Browse and compare sweep results">Sweep Results</button>
    <button id="btn-export" disabled>Export Selection</button>
  </div>

  <div id="main">
    <div id="panel">
      <div id="stem-filter-bar"></div>
      <div id="track-list"></div>
    </div>
    <div id="canvas-wrap">
      <canvas id="bg-canvas"></canvas>
      <canvas id="fg-canvas"></canvas>
    </div>
  </div>

  <audio id="player" src="/audio" preload="auto"></audio>

  <div id="status">Loading analysis...</div>

  <script src="/navbar.js"></script>
  <script src="/app.js"></script>
</body>
</html>
