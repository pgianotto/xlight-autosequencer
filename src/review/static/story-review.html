<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Story Review — x-onset</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="story-review.css">
  <link rel="stylesheet" href="navbar.css">
</head>
<body>

  <div id="loading">Loading song story...</div>

  <div id="app" style="display:none;">
    <div id="toolbar">
      <button id="back-btn" onclick="window.location.href='/'">&#8592; Library</button>
      <span id="song-title">Song Story Review</span>
      <span class="toolbar-sep"></span>
      <button id="play-btn">&#9654; Play</button>
      <span id="time-display">0:00 / 0:00</span>
      <span class="toolbar-sep"></span>
      <button id="zoom-in-btn" title="Zoom in (Ctrl+scroll)">+</button>
      <button id="zoom-out-btn" title="Zoom out (Ctrl+scroll)">-</button>
      <button id="zoom-reset-btn" title="Reset zoom">Fit</button>
      <span class="toolbar-sep"></span>
      <button id="accents-btn" title="Toggle accent layers">Accents</button>
      <span class="toolbar-sep"></span>
      <button id="save-btn">Save</button>
      <button id="export-btn">Export</button>
      <button id="revert-btn" title="Revert to auto-generated story">Revert</button>
      <button id="prefs-btn">&#9881; Prefs</button>
    </div>

    <div id="accent-toggles" style="display:none;">
      <label class="accent-toggle" data-stem="drums"><input type="checkbox" checked /><span class="accent-dot" style="background:#ffee44"></span>Drums</label>
      <label class="accent-toggle" data-stem="bass"><input type="checkbox" checked /><span class="accent-dot" style="background:#ff6020"></span>Bass</label>
      <label class="accent-toggle" data-stem="vocals"><input type="checkbox" checked /><span class="accent-dot" style="background:#00e0ff"></span>Vocals</label>
      <label class="accent-toggle" data-stem="guitar"><input type="checkbox" /><span class="accent-dot" style="background:#40ff90"></span>Guitar</label>
      <label class="accent-toggle" data-stem="piano"><input type="checkbox" /><span class="accent-dot" style="background:#d080ff"></span>Piano</label>
      <label class="accent-toggle" data-stem="other"><input type="checkbox" /><span class="accent-dot" style="background:#ffffff"></span>Other</label>
    </div>

    <div id="main">
      <div id="timeline-area">
        <canvas id="timeline"></canvas>
        <canvas id="stem-tracks"></canvas>
        <div id="playhead-bar"></div>
      </div>

      <div id="flyout" class="flyout flyout--closed">
        <div class="flyout-header">
          <div class="flyout-tabs">
            <button class="flyout-tab active" data-tab="details">Details</button>
            <button class="flyout-tab" data-tab="moments">Moments</button>
            <button class="flyout-tab" data-tab="themes">Themes</button>
            <button class="flyout-tab" data-tab="generate">Generate</button>
          </div>
          <button class="flyout-close" aria-label="Close panel">&times;</button>
        </div>
        <div class="flyout-body">
          <div class="flyout-content" data-tab-content="details">
            <p class="placeholder">Select a section</p>
          </div>
          <div class="flyout-content" data-tab-content="moments" hidden>
          </div>
          <div class="flyout-content" data-tab-content="themes" hidden>
            <p class="placeholder">Themes coming soon</p>
          </div>
          <div class="flyout-content" data-tab-content="generate" hidden>
          </div>
        </div>
        <div id="prefs-panel" style="display:none;">
          <!-- Populated by renderPreferencesPanel() -->
        </div>
      </div>
    </div>
  </div>

  <audio id="player" preload="auto"></audio>

  <script src="navbar.js"></script>
  <script src="story-review.js?v=8"></script>
</body>
</html>
