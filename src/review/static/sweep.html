<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sweep Timing Tracks — x-onset</title>
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/style.css">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    #sweep-toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; background: #222; border-bottom: 1px solid var(--xo-border); flex-shrink: 0;
    }
    #sweep-toolbar button {
      padding: 4px 10px; background: #333; color: #ccc; border: 1px solid #444;
      border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    #sweep-toolbar button:hover { background: #444; }
    #sweep-toolbar button.active { background: #2a5; color: #fff; border-color: #2a5; }
    .toolbar-sep { width: 1px; height: 20px; background: #444; }

    #stem-filters { display: flex; gap: 4px; }
    #stem-filters button { font-size: 11px; padding: 3px 8px; }
    #stem-filters button.active { background: #2855a5; color: #fff; border-color: #2855a5; }

    #main-area { display: flex; flex: 1; overflow: hidden; }

    #panel {
      width: 220px; min-width: 220px; overflow-y: auto; overflow-x: hidden;
      background: var(--xo-bg); border-right: 1px solid var(--xo-border);
    }

    .lane-row {
      display: flex; align-items: center; height: 28px; min-height: 28px; max-height: 28px;
      padding: 0 6px; font-size: 11px; cursor: pointer;
      box-sizing: border-box; border-bottom: 1px solid #222;
    }
    .lane-row:hover { background: #252530; }
    .lane-row.selected { background: #1a3050; }
    .lane-row .check { margin-right: 6px; }
    .lane-row .rank { color: #666; width: 24px; text-align: right; margin-right: 6px; }
    .lane-row .score { color: #4a9; width: 36px; margin-right: 6px; font-weight: bold; }
    .lane-row .name { color: #ccc; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lane-row .stem-badge {
      font-size: 9px; padding: 1px 4px; border-radius: 3px;
      background: #333; color: #999; margin-left: 4px;
    }

    #canvas-wrap {
      flex: 1; position: relative; overflow-x: auto; overflow-y: auto; background: #111;
    }
    canvas { position: absolute; top: 0; left: 0; display: block; }
    #fg-canvas { pointer-events: none; }

    #export-bar {
      display: none; padding: 6px 12px; background: #1a3a1a; border-top: 1px solid #3a5;
      color: #adb; font-size: 12px; flex-shrink: 0; gap: 10px; align-items: center;
    }
    #export-bar button { background: #2a5; color: #fff; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="sweep-toolbar">
    <button onclick="window.location.href='/'">&#8592; Timeline</button>
    <button id="btn-play">Play</button>
    <span id="time-display" style="color:#888; font-size:12px; min-width:80px;">0:00 / 0:00</span>
    <span class="toolbar-sep"></span>
    <div id="stem-filters"></div>
    <span class="toolbar-sep"></span>
    <button id="btn-zoom-out">&#8722;</button>
    <span id="zoom-level" style="font-size:11px; color:#888; min-width:38px; text-align:center;">100%</span>
    <button id="btn-zoom-in">+</button>
    <span class="toolbar-sep"></span>
    <span id="result-count" style="color:#666; font-size:11px;"></span>
    <button id="btn-select-all" style="font-size:11px;">Select All</button>
    <button id="btn-select-none" style="font-size:11px;">Select None</button>
  </div>

  <div id="main-area">
    <div id="panel"></div>
    <div id="canvas-wrap">
      <canvas id="bg-canvas"></canvas>
      <canvas id="fg-canvas"></canvas>
      <div id="canvas-spacer" style="position:absolute;top:0;left:0;height:1px;pointer-events:none;"></div>
    </div>
  </div>

  <div id="export-bar">
    <span id="export-info"></span>
    <button id="btn-export" onclick="exportSelected()">Export Selected</button>
  </div>

  <audio id="player" src="/audio" preload="auto"></audio>
  <div id="status">Loading sweep results...</div>

  <script src="/sweep-timing.js"></script>
</body>
</html>
