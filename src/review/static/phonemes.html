<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phoneme Review — xlight-analyze</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    #song-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #aaa;
      font-size: 12px;
    }

    .audio-toggle {
      display: flex;
      border: 1px solid #444;
      border-radius: 4px;
      overflow: hidden;
    }
    .audio-toggle button {
      border: none;
      border-radius: 0;
      padding: 4px 10px;
      background: #2a2a2a;
      color: #888;
      font-size: 12px;
      cursor: pointer;
    }
    .audio-toggle button:hover:not(:disabled) { background: #383838; color: #ccc; }
    .audio-toggle button.active { background: #2855a5; color: #cdf; }
    .audio-toggle button:disabled { opacity: 0.35; cursor: default; }

    /* Lyrics */
    #lyrics-section {
      flex-shrink: 0;
      max-height: 120px;
      overflow-y: auto;
      padding: 8px 12px;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
    }
    #lyrics-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 3px 5px;
      line-height: 1.9;
    }
    .word {
      padding: 1px 4px;
      border-radius: 3px;
      color: #666;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.05s, color 0.05s;
    }
    .word:hover { color: #aaa; }
    .word.active { background: #4a9eff; color: #fff; }
    .word.past { color: #444; }

    /* fg-canvas needs to receive clicks for seeking */
    #fg-canvas { pointer-events: auto !important; cursor: pointer; }
  </style>
</head>
<body>
  <div id="toolbar">
    <button onclick="window.location.href='/library-view'">&#8592; Library</button>
    <button onclick="window.location.href='/'">Timeline</button>
    <span id="song-name"></span>
    <div class="audio-toggle">
      <button id="btn-full-mix" class="active">Full Song</button>
      <button id="btn-vocals">Vocals Only</button>
    </div>
    <button id="btn-play">Play</button>
    <span id="time-display">0:00 / 0:00</span>
  </div>

  <div id="lyrics-section">
    <div id="lyrics-wrap"></div>
  </div>

  <div id="main">
    <div id="panel"></div>
    <div id="canvas-wrap">
      <canvas id="bg-canvas"></canvas>
      <canvas id="fg-canvas"></canvas>
    </div>
  </div>

  <audio id="player" preload="auto"></audio>
  <div id="status">Loading phoneme data…</div>

  <script src="/phonemes.js"></script>
</body>
</html>
