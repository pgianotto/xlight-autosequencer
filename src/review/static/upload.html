<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>x-onset — Upload &amp; Analyze</title>
  <link rel="stylesheet" href="/theme.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--xo-bg);
      color: var(--xo-fg);
      font-family: var(--xo-font-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 2rem;
      letter-spacing: 0.02em;
    }

    #upload-form {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    #drop-zone {
      border: 2px dashed #555;
      border-radius: 8px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: #242424;
    }
    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: var(--xo-accent);
      background: var(--xo-accent-dim);
    }

    #drop-zone p {
      color: #888;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    #file-name {
      font-size: 0.85rem;
      color: var(--xo-accent);
      font-weight: 500;
      min-height: 1.2em;
    }

    #file-error {
      font-size: 0.82rem;
      color: #ff6b6b;
      min-height: 1.2em;
    }

    #btn-browse {
      padding: 0.45rem 1.1rem;
      background: #333;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 6px;
      font-size: 0.88rem;
      cursor: pointer;
      align-self: flex-start;
    }
    #btn-browse:hover { background: #3a3a3a; border-color: var(--xo-accent); color: #fff; }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      font-size: 0.88rem;
    }
    .options-row {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .options label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      color: #bbb;
    }
    .options label.story-label {
      color: #a78bfa;
    }
    .options input[type="checkbox"] {
      accent-color: var(--xo-accent);
      width: 15px;
      height: 15px;
    }
    #chk-story {
      accent-color: #a78bfa;
    }
    .options-divider {
      border: none;
      border-top: 1px solid #333;
      margin: 0.2rem 0;
    }

    #btn-analyze {
      padding: 0.6rem 1.4rem;
      background: var(--xo-accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      align-self: flex-start;
    }
    #btn-analyze:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    #btn-analyze:not(:disabled):hover {
      background: #2d82e0;
    }

    /* ── Progress section ─────────────────────────────────────── */

    #progress-section {
      display: none;
      width: 100%;
      max-width: 480px;
      flex-direction: column;
      gap: 1rem;
    }

    #status-line {
      font-size: 0.9rem;
      color: #bbb;
    }

    .progress-bar-wrap {
      background: #333;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--xo-accent);
      transition: width 0.25s ease;
      border-radius: 4px;
    }

    #algo-list {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      max-height: 320px;
      overflow-y: auto;
      font-size: 0.82rem;
    }
    .algo-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--xo-fg);
      padding: 0.1rem 0;
    }
    .algo-row .ok  { color: #4caf50; }
    .algo-row .err { color: #ff6b6b; }
    .algo-row .marks { color: #888; font-size: 0.78rem; }
    .stage-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--xo-accent);
      font-weight: 600;
      font-size: 0.82rem;
      padding: 0.4rem 0 0.2rem;
      border-top: 1px solid #333;
      margin-top: 0.25rem;
    }
    .stage-row:first-child {
      border-top: none;
      margin-top: 0;
      padding-top: 0;
    }
    .stage-row .stage-icon { font-size: 0.9rem; }

    #error-block {
      display: none;
      flex-direction: column;
      gap: 0.75rem;
    }
    #error-message {
      color: #ff6b6b;
      font-size: 0.9rem;
    }
    #btn-retry {
      padding: 0.5rem 1.2rem;
      background: #555;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.88rem;
      align-self: flex-start;
    }
    #btn-retry:hover { background: #666; }

    /* ── Genius prompt ──────────────────────────────────────── */
    .genius-prompt {
      background: #2a2a3a;
      border: 1px solid #4a4a6a;
      border-radius: 8px;
      padding: 1rem;
      margin-top: 0.5rem;
    }
    .genius-prompt p {
      color: #a78bfa;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
    }
    .genius-fields {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .genius-fields input {
      flex: 1;
      padding: 0.4rem 0.6rem;
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 4px;
      font-size: 0.85rem;
    }
    .genius-fields input:focus {
      outline: none;
      border-color: #a78bfa;
    }
    .genius-buttons {
      display: flex;
      gap: 0.5rem;
    }
    .genius-submit {
      padding: 0.4rem 1rem;
      background: #a78bfa;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .genius-submit:hover { background: #8b6fe0; }
    .genius-skip {
      padding: 0.4rem 1rem;
      background: #444;
      color: #ccc;
      border: none;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .genius-skip:hover { background: #555; }
  </style>
</head>
<body>
  <h1 class="brand-header"><span class="xo-css-logo">x-<span class="onset-pulse">onset</span></span></h1>

  <!-- Upload form -->
  <div id="upload-form">
    <div id="drop-zone">
      <strong>Drop an MP3 here</strong>
      <p id="file-name"></p>
      <p id="file-error"></p>
    </div>
    <input type="file" id="file-input" accept=".mp3" style="display:none" />
    <button type="button" id="btn-browse">Browse for file…</button>

    <div class="options">
      <div class="options-row">
        <label>
          <input type="checkbox" id="chk-vamp" checked />
          Vamp plugins (~14 tracks)
        </label>
        <label>
          <input type="checkbox" id="chk-madmom" checked />
          madmom (~2 tracks)
        </label>
      </div>
      <div class="options-row">
        <label>
          <input type="checkbox" id="chk-stems" checked />
          Stem separation
        </label>
        <label>
          <input type="checkbox" id="chk-phonemes" />
          Phonemes
        </label>
        <label>
          <input type="checkbox" id="chk-structure" checked />
          Song structure
        </label>
      </div>
      <hr class="options-divider" />
      <div class="options-row">
        <label class="story-label">
          <input type="checkbox" id="chk-story" checked />
          Build song story
        </label>
      </div>
    </div>

    <button id="btn-analyze" disabled>Analyze</button>
  </div>

  <!-- Progress section (hidden until analysis starts) -->
  <div id="progress-section">
    <div id="status-line">Analyzing…</div>
    <div class="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
    <div id="algo-list"></div>
    <div id="error-block">
      <div id="error-message"></div>
      <button id="btn-retry">Try again</button>
    </div>
  </div>

  <script src="upload.js"></script>
</body>
</html>
