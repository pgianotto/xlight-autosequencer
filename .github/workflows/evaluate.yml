name: Acceptance Gate (Tier A)

on:
  pull_request:
  push:
    branches: [main]

# Tier A — cheap, deterministic checks that run on every PR.
# Tier B (full xlight-evaluate gate with real analyzer pipeline + content UI
# flow) is local-only by design — see CLAUDE.md "Pre-merge acceptance gate".
# Install complexity (.venv-vamp + madmom + vamp plugins + demucs models) and
# runtime cost (~20+ min per PR cold) make it impractical on fresh CI runners.

jobs:
  python-unit-tests:
    name: Python unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit + integration tests
        # Excludes ui/content/slow markers — those need browser + audio fixtures
        # (handled in the ui-smoke job) or full madmom (local-only).
        #
        # The --ignore flags below quarantine pre-existing test rot — files
        # that fail on main for environment-specific or stale-assertion reasons
        # unrelated to any recent change. See docs/known-broken-tests.md for
        # the breakdown and remediation plan. Fix-and-unquarantine PRs should
        # update both this list and that doc.
        run: |
          pytest tests/ -m "not ui and not content and not slow and not capture_only" \
            --tb=short -v \
            --ignore=tests/evaluation/test_cli_check.py \
            --ignore=tests/evaluation/test_cli_compare.py \
            --ignore=tests/evaluation/test_cli_snapshot.py \
            --ignore=tests/evaluation/test_compare.py \
            --ignore=tests/evaluation/test_integration_smoke.py \
            --ignore=tests/evaluation/test_xsq_reader.py \
            --ignore=tests/integration/test_brief_tab_render.py \
            --ignore=tests/integration/test_path_resolution.py \
            --ignore=tests/integration/test_song_workspace_flow.py \
            --ignore=tests/integration/test_theme_variant_picker.py \
            --ignore=tests/integration/test_themes_integration.py \
            --ignore=tests/integration/test_variant_api_browse.py \
            --ignore=tests/integration/test_variant_api_crud.py \
            --ignore=tests/integration/test_variant_import.py \
            --ignore=tests/integration/test_variant_query.py \
            --ignore=tests/packaging/test_import_by_path.py \
            --ignore=tests/packaging/test_manifest_endpoint.py \
            --ignore=tests/review/test_api_analysis.py \
            --ignore=tests/review/test_api_library.py \
            --ignore=tests/review/test_api_themes.py \
            --ignore=tests/review/test_audio_stream.py \
            --ignore=tests/unit/test_brief_persistence.py \
            --ignore=tests/unit/test_brief_routes.py \
            --ignore=tests/unit/test_dashboard_routes.py \
            --ignore=tests/unit/test_genius_segments.py \
            --ignore=tests/unit/test_librosa_hpss.py \
            --ignore=tests/unit/test_paths.py \
            --ignore=tests/unit/test_repetition_policy.py \
            --ignore=tests/unit/test_section_profiler.py \
            --ignore=tests/unit/test_song_workspace_route.py \
            --ignore=tests/unit/test_stem_inspector.py \
            --ignore=tests/unit/test_stems.py \
            --ignore=tests/unit/test_theme_routes.py \
            --ignore=tests/unit/test_transitions.py \
            --ignore=tests/unit/test_variant_cli.py \
            --ignore=tests/unit/test_variant_crud_cli.py \
            --ignore=tests/unit/test_variant_library.py \
            --ignore=tests/validation/test_scenarios.py

  generator-quality-check:
    name: Generator baseline check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e .
      - name: Check pro-reference corpus availability
        id: corpus
        # The pro-reference baseline references absolute MP3 paths on the
        # maintainer's local machine. On GitHub-hosted runners those files
        # don't exist — skip cleanly. The CC0 corpus check happens in the
        # acceptance-gate job below; this stays for the legacy generator
        # baseline workflow.
        run: |
          manifest="tests/golden/pro_reference/manifest.json"
          if [ ! -f "$manifest" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Pro-reference manifest missing — skipping legacy generator check."
            exit 0
          fi
          any_exists=false
          while IFS= read -r mp3; do
            if [ -f "$mp3" ]; then
              any_exists=true
              break
            fi
          done < <(python -c "import json, sys; [print(e['mp3_path']) for e in json.load(open('$manifest'))['entries']]")
          if [ "$any_exists" = "true" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No pro-reference corpus on this runner — skipping (expected on GitHub-hosted CI)."
          fi
      - name: Run generator quality calibration check
        if: steps.corpus.outputs.available == 'true'
        run: xlight-evaluate check
        # Exit 0 = pass, 6 = regression, 4 = no baseline.

  ui-smoke:
    name: UI smoke flows (Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/review/frontend/package-lock.json
      - name: Install Python package + UI test extras
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,ui-tests]"
      - name: Cache Playwright browsers
        # Playwright Chromium is ~90 MB — cache by the Playwright version
        # pin in pyproject.toml so the download only happens on dep bumps.
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps
      - name: Install Playwright system deps (always — fast)
        # `--with-deps` installs apt packages; safe to re-run.
        run: playwright install-deps chromium
      - name: Cache CC0 corpus MP3s
        # The download script is hash-verified, so a cached set is safe to
        # reuse. Cache key keyed on the script's SHA — bump the script,
        # force a re-download on next run.
        uses: actions/cache@v4
        with:
          path: tests/fixtures/cc0_music/*.mp3
          key: cc0-corpus-${{ hashFiles('tests/validation/download_fixtures.py', 'tests/fixtures/cc0_music/manifest.json') }}
      - name: Download CC0 corpus
        run: python -m tests.validation.download_fixtures
      - name: Build frontend bundle
        # Flask serves the built dist/ — the UI tests need it present.
        working-directory: src/review/frontend
        run: |
          npm ci
          npm run build
      - name: Run UI smoke flows
        # `-m "ui and not content"` runs the 4 smoke flows + multi-song +
        # metadata-edit + folder/filter + timeline-placeholder flows.
        # Excludes the content flow which needs the .venv-vamp sidecar.
        run: |
          pytest tests/ui/ -m "ui and not content" \
            --browser chromium \
            --tb=short -v \
            --screenshot=only-on-failure \
            --video=retain-on-failure \
            --tracing=retain-on-failure \
            --full-page-screenshot
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            test-results/
            tests/golden/ui/screenshots/
          retention-days: 14
